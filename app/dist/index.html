<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rod Hockey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Palette: a dark arena with a cold, glowing sheet of ice ─────────────── */
    :root {
      --arena:   #0a1422;   /* deep arena night */
      --arena-2: #102134;   /* panel navy */
      --ice-a:   #e6f1fb;   /* ice highlight */
      --ice-b:   #bfd8ee;   /* ice shadow */
      --line-blue: #1e5fd8; /* rink blue lines */
      --line-red:  #d7263d; /* center line / creases */
      --puck:    #0e0f12;
      --gold:    #f4b740;   /* scoreboard accent */
      --goal:    #ff2d2d;   /* goal light */
      --ink:     #eaf2fb;
      --muted:   #8aa0b8;
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background:
        radial-gradient(1200px 600px at 50% -10%, #16314d 0%, var(--arena) 60%);
      color: var(--ink); font-family: 'Inter', system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center;
    }
    .wrap { width: 100%; max-width: 560px; padding: 18px 18px 28px; }

    /* ── Scoreboard header ──────────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; gap: 12px;
      background: linear-gradient(180deg, var(--arena-2), #0b1828);
      border: 1px solid #1d3a57;
      border-radius: 14px; padding: 12px 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.45);
    }
    header .sticks { width: 34px; height: 34px; flex: none; }
    h1 {
      font-family: 'Bebas Neue', sans-serif; font-weight: 400;
      font-size: 34px; letter-spacing: 2px; margin: 0; line-height: 1;
      flex: 1; color: var(--ink);
    }
    h1 b { color: var(--gold); }
    .conn {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); font-weight: 600;
    }
    .led { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
    .led.live { background: #3fdc6b; box-shadow: 0 0 10px #3fdc6b; }
    .led.bad  { background: var(--goal); box-shadow: 0 0 10px var(--goal); }

    /* ── The rink (also the puck-detection display) ─────────────────────────── */
    .rink-card {
      margin-top: 16px; border-radius: 18px; overflow: hidden;
      border: 3px solid #20435f; box-shadow: 0 12px 34px rgba(0,0,0,.5);
      background: #0d1c2c;
    }
    svg.rink { display: block; width: 100%; height: auto; }
    #puck { transition: transform .45s cubic-bezier(.2,.8,.2,1), opacity .25s; }
    .puck-caption {
      text-align: center; margin: 12px 2px 0; font-size: 14px; color: var(--muted);
    }
    .puck-caption b { color: var(--ink); }

    /* ── Controls ───────────────────────────────────────────────────────────── */
    .controls { margin-top: 18px; display: flex; flex-direction: column; gap: 12px; }
    button {
      font-family: 'Bebas Neue', sans-serif; letter-spacing: 1.5px;
      font-size: 26px; border: none; border-radius: 14px; cursor: pointer;
      color: #fff; padding: 18px 20px; display: flex; align-items: center;
      gap: 14px; transition: transform .08s, filter .15s; text-align: left;
    }
    button:active { transform: translateY(2px); }
    button:disabled { filter: grayscale(.7) brightness(.6); cursor: not-allowed; }
    button:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
    button .ico { width: 30px; height: 30px; flex: none; }
    button .label { flex: 1; }

    /* Auto-play: arena button with a goal light on the right */
    .auto {
      background: linear-gradient(180deg, #1f7a3a, #14622e);
      box-shadow: inset 0 0 0 1px #2da156, 0 8px 22px rgba(20,98,46,.4);
    }
    .auto.on {
      background: linear-gradient(180deg, #9a1626, #6f0f1b);
      box-shadow: inset 0 0 0 1px #d7263d, 0 8px 22px rgba(215,38,61,.45);
    }
    .lamp {
      width: 18px; height: 18px; border-radius: 50%; flex: none;
      background: #3a0d12; box-shadow: inset 0 0 4px #000;
    }
    .auto.on .lamp {
      background: var(--goal);
      box-shadow: 0 0 16px 4px var(--goal), inset 0 0 4px #ff9a9a;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 50% { opacity: .55; } }

    /* Home: ice-resurfacing (Zamboni) reset */
    .home { background: linear-gradient(180deg, #29445f, #1b3147);
            box-shadow: inset 0 0 0 1px #38597a; }

    .status {
      text-align: center; margin-top: 14px; min-height: 18px;
      font-size: 13px; color: var(--muted); letter-spacing: .3px;
      word-break: break-word;
    }
    /* Collapsible error panel — hidden until something fails. */
    .errbox { display: none; margin-top: 10px; background: #1a0e12;
              border: 1px solid #5b1f27; border-radius: 10px; padding: 0 14px; }
    .errbox[open] { padding-bottom: 12px; }
    .errbox summary { cursor: pointer; padding: 12px 0; color: #ff8a8a;
                      font-size: 13px; letter-spacing: .3px; list-style: none; }
    .errbox summary::-webkit-details-marker { display: none; }
    .errbox pre { margin: 0; white-space: pre-wrap; word-break: break-word;
                  font-size: 12px; color: #ffb3b3; font-family: ui-monospace, monospace; }
    @media (prefers-reduced-motion: reduce) {
      #puck { transition: none; }
      .auto.on .lamp { animation: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- Scoreboard header: crossed sticks, title, connection light -->
    <header>
      <svg class="sticks" viewBox="0 0 40 40" aria-hidden="true">
        <g stroke="#d9b27a" stroke-width="3" stroke-linecap="round">
          <line x1="7" y1="6" x2="30" y2="30" />
          <line x1="33" y1="6" x2="10" y2="30" />
        </g>
        <path d="M28 28 L36 30 L34 36 L27 33 Z" fill="#d7263d"/>
        <path d="M12 28 L4 30 L6 36 L13 33 Z" fill="#1e5fd8"/>
      </svg>
      <h1>ROD <b>HOCKEY</b></h1>
      <span class="conn" id="conn"><span class="led" id="led"></span><span id="connText">Connecting</span></span>
    </header>

    <!-- Rink: top-down ice. The puck rides the left/right face-off dot. -->
    <div class="rink-card">
      <svg class="rink" viewBox="0 0 600 300" role="img" aria-label="Rink with puck position">
        <defs>
          <linearGradient id="ice" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="var(--ice-a)"/>
            <stop offset="1" stop-color="var(--ice-b)"/>
          </linearGradient>
        </defs>
        <!-- ice surface + boards -->
        <rect x="10" y="10" width="580" height="280" rx="92" fill="url(#ice)" stroke="#9bb6cf" stroke-width="2"/>
        <!-- goal lines -->
        <line x1="78"  y1="20" x2="78"  y2="280" stroke="var(--line-red)" stroke-width="2"/>
        <line x1="522" y1="20" x2="522" y2="280" stroke="var(--line-red)" stroke-width="2"/>
        <!-- blue lines -->
        <rect x="222" y="10" width="6" height="280" fill="var(--line-blue)"/>
        <rect x="372" y="10" width="6" height="280" fill="var(--line-blue)"/>
        <!-- center line + circle -->
        <rect x="297" y="10" width="6" height="280" fill="var(--line-red)"/>
        <circle cx="300" cy="150" r="46" fill="none" stroke="var(--line-blue)" stroke-width="2.5"/>
        <circle cx="300" cy="150" r="4" fill="var(--line-red)"/>
        <!-- goal creases + nets -->
        <path d="M78 132 a18 18 0 0 1 0 36 Z" fill="#bcd6ef" stroke="var(--line-red)" stroke-width="1.5"/>
        <path d="M522 132 a18 18 0 0 0 0 36 Z" fill="#bcd6ef" stroke="var(--line-red)" stroke-width="1.5"/>
        <rect x="62" y="136" width="14" height="28" fill="none" stroke="var(--line-red)" stroke-width="2"/>
        <rect x="524" y="136" width="14" height="28" fill="none" stroke="var(--line-red)" stroke-width="2"/>
        <!-- end-zone face-off dots (left / right puck homes) -->
        <circle cx="140" cy="150" r="30" fill="none" stroke="var(--line-red)" stroke-width="2"/>
        <circle cx="140" cy="150" r="4" fill="var(--line-red)"/>
        <circle cx="460" cy="150" r="30" fill="none" stroke="var(--line-red)" stroke-width="2"/>
        <circle cx="460" cy="150" r="4" fill="var(--line-red)"/>
        <!-- the puck (moved by JS to the detected side) -->
        <g id="puck" opacity="0" transform="translate(300,150)">
          <ellipse cx="0" cy="3" rx="17" ry="11" fill="#000" opacity=".25"/>
          <ellipse cx="0" cy="0" rx="17" ry="11" fill="var(--puck)"/>
          <ellipse cx="0" cy="-3" rx="14" ry="7" fill="#2a2d33"/>
        </g>
      </svg>
    </div>
    <p class="puck-caption" id="puckCap">Searching for the puck…</p>

    <div class="controls">
      <!-- Auto-play with goal light -->
      <button id="auto" class="auto" disabled>
        <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 5v14l11-7z" fill="#fff"/></svg>
        <span class="label" id="autoLabel">Auto-play: off</span>
        <span class="lamp"></span>
      </button>

      <!-- Home all rods, themed as resurfacing the ice (Zamboni) -->
      <button id="home" class="home" disabled>
        <svg class="ico" viewBox="0 0 32 24" aria-hidden="true">
          <rect x="3" y="9" width="20" height="9" rx="2" fill="#cfe0f0"/>
          <rect x="9" y="4" width="11" height="6" rx="1.5" fill="#9fc0e0"/>
          <rect x="22" y="12" width="7" height="6" rx="1.5" fill="#7fa6cc"/>
          <circle cx="9" cy="20" r="3" fill="#0e0f12"/>
          <circle cx="20" cy="20" r="3" fill="#0e0f12"/>
        </svg>
        <span class="label">Home all rods</span>
      </button>
    </div>

    <p class="status" id="status"></p>

    <!-- Collapsible error readout: appears only when a call fails. -->
    <details class="errbox" id="errBox">
      <summary id="errSummary">⚠ Error — tap for details</summary>
      <pre id="errMsg"></pre>
    </details>
  </div>

  <script type="module">
    import * as VIAM from 'https://esm.sh/@viamrobotics/sdk@0.40.0';
    import { getHostAndCredentials } from './auth.js';

    const SERVICE_NAME = 'rod-hockey-game';

    // ── Skip the Viam login ──────────────────────────────────────────────────
    // Fill these in to let anyone open the page and play without logging in to
    // Viam. SECURITY: these are shipped in the page, so anyone who can reach the
    // URL can read them and control the machine — use a tightly-scoped LOCATION
    // api key, not your personal one. Leave blank to require the normal Viam login.
    const EMBEDDED = {
      host: '',       // e.g. 'rig1-2270-main.wpth7nhx2w.viam.cloud'
      apiKeyId: '',   // location api key id
      apiKey: '',     // location api key secret
    };

    // Where the puck sits on the rink SVG for each side.
    const DOT = { left: 140, right: 460 };

    const led = document.getElementById('led');
    const connText = document.getElementById('connText');
    const puck = document.getElementById('puck');
    const puckCap = document.getElementById('puckCap');
    const autoBtn = document.getElementById('auto');
    const autoLabel = document.getElementById('autoLabel');
    const homeBtn = document.getElementById('home');
    const statusEl = document.getElementById('status');
    const errBox = document.getElementById('errBox');
    const errSummary = document.getElementById('errSummary');
    const errMsg = document.getElementById('errMsg');

    let service = null;
    let autoOn = false;

    // Show the collapsible error panel with a label + the real message.
    function showError(label, e) {
      errSummary.textContent = `⚠ ${label} — tap for details`;
      errMsg.textContent = e?.message || String(e);
      errBox.style.display = 'block';
      console.error(label, e);
    }
    function clearError() { errBox.style.display = 'none'; }

    async function connect() {
      // Embedded credentials if provided (no login), else the Viam login cookies.
      const { host, credentials } = EMBEDDED.host && EMBEDDED.apiKey
        ? { host: EMBEDDED.host,
            credentials: { type: 'api-key', payload: EMBEDDED.apiKey, authEntity: EMBEDDED.apiKeyId } }
        : getHostAndCredentials();
      const client = await VIAM.createRobotClient({
        host, credentials, signalingAddress: 'https://app.viam.com:443',
      });
      service = new VIAM.GenericServiceClient(client, SERVICE_NAME);
      led.className = 'led live';
      connText.textContent = 'Live';
      autoBtn.disabled = false;
      homeBtn.disabled = false;
    }

    // Paint the auto-play button + goal light to match the current state.
    function renderAuto() {
      autoLabel.textContent = autoOn ? 'Auto-play: on' : 'Auto-play: off';
      autoBtn.className = autoOn ? 'auto on' : 'auto';
    }

    // Move the puck onto the detected face-off dot, or hide it when not seen.
    function renderPuck(detected, side) {
      if (detected) {
        const x = DOT[side] ?? 300;
        puck.setAttribute('transform', `translate(${x},150)`);
        puck.setAttribute('opacity', '1');
        puckCap.innerHTML = `Puck on the <b>${side}</b>`;
      } else {
        puck.setAttribute('opacity', '0');
        puckCap.textContent = 'Searching for the puck…';
      }
    }

    async function refreshStatus() {
      if (!service) return;
      try {
        const s = await service.doCommand(VIAM.Struct.fromJson({ action: 'status' }));
        autoOn = !!s.auto_play;
        renderAuto();
        renderPuck(!!s.puck_detected, s.puck_side);
        // Recovered: clear any prior error and show Live again.
        led.className = 'led live';
        connText.textContent = 'Live';
        clearError();
      } catch (e) {
        led.className = 'led bad';
        connText.textContent = 'Offline';
        showError('Status failed', e);
      }
    }

    autoBtn.onclick = async () => {
      autoBtn.disabled = true;
      try {
        await service.doCommand(VIAM.Struct.fromJson({ action: 'auto_play', enabled: !autoOn }));
        await refreshStatus();
      } catch (e) {
        showError('Auto-play failed', e);
      } finally {
        autoBtn.disabled = false;
      }
    };

    homeBtn.onclick = async () => {
      homeBtn.disabled = true;
      statusEl.textContent = 'Resurfacing — homing all rods…';
      try {
        const r = await service.doCommand(VIAM.Struct.fromJson({ action: 'home' }));
        statusEl.textContent = r.message || 'Rods homed.';
      } catch (e) {
        statusEl.textContent = '';
        showError('Home failed', e);
      } finally {
        homeBtn.disabled = false;
      }
    };

    // Boot. Surface connection failures in the panel too (instead of a silent hang).
    try {
      await connect();
      await refreshStatus();
      setInterval(refreshStatus, 1000);
    } catch (e) {
      led.className = 'led bad';
      connText.textContent = 'Offline';
      showError('Connect failed', e);
    }
  </script>
</body>
</html>
