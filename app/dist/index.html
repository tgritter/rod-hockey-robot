<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rod Hockey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@500;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ── Arcade-cabinet theme: neon-on-dark, VIAM helmet blue ──────────────── */
    :root{
      --void:#05060f; --void2:#0a0d22;
      --cyan:#22e7ff; --magenta:#ff2e8b; --cobalt:#2f6bff;
      --ice-a:#e9f5ff; --ice-b:#bcd9f5; --line-blue:#1e5fd8; --line-red:#ff2d4a;
      --gold:#ffd23f; --goal:#ff2d4a; --ink:#eafaff; --muted:#7fa0c8;
      --isle-blue:#0a4fd6; --isle-deep:#0a2a6b; --isle-orange:#fc4c02;
      color-scheme:dark;
    }
    *{box-sizing:border-box;}
    body{
      margin:0; min-height:100vh; font-family:'Inter',system-ui,sans-serif; color:var(--ink);
      background:
        radial-gradient(900px 480px at 50% -8%, #14215e 0%, rgba(10,13,34,0) 60%),
        repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 2px, rgba(0,0,0,0) 2px 4px),
        linear-gradient(180deg,#070a1a,#05060f);
    }
    /* clean neon arcade-cabinet frame hugging the screen edges */
    .frame{position:fixed; inset:14px; z-index:60; pointer-events:none; border-radius:16px;
      border:1px solid rgba(34,231,255,.55);
      box-shadow:0 0 0 2px rgba(47,107,255,.35), 0 0 24px 3px rgba(34,231,255,.4), inset 0 0 26px rgba(34,231,255,.14);}

    .wrap{max-width:720px; margin:0 auto; padding:46px 30px 56px; position:relative; z-index:2;}

    /* arcade marquee */
    .marquee{display:flex; align-items:center; justify-content:center; gap:18px; margin-bottom:6px;}
    .marquee h1{font-family:'Press Start 2P',monospace; font-size:30px; line-height:1.25; margin:0; text-align:center;
      color:#fff; text-shadow:0 0 8px var(--cyan), 4px 4px 0 var(--magenta), 0 0 22px rgba(47,107,255,.7); letter-spacing:1px;}
    .credits{display:flex; justify-content:space-between; align-items:center; font-family:'Press Start 2P',monospace;
      font-size:9px; color:var(--muted); margin:16px 4px 0; letter-spacing:1px;}
    .credits .live{display:inline-flex; align-items:center; gap:7px; color:var(--muted);}
    .led{width:9px; height:9px; border-radius:50%; background:var(--muted);}
    .led.live{background:var(--cyan); box-shadow:0 0 10px var(--cyan);}
    .led.bad{background:var(--goal); box-shadow:0 0 10px var(--goal);}
    .credits .live.on{color:var(--cyan); text-shadow:0 0 8px var(--cyan);}
    .blink{animation:blink 1.1s steps(1) infinite;} @keyframes blink{50%{opacity:.2;}}

    .screen{margin-top:16px; border-radius:14px; padding:12px; background:linear-gradient(180deg,#0b1024,#070a16);
      border:1px solid #1d2a55; box-shadow:0 0 0 3px #0a0f24, 0 0 50px rgba(47,107,255,.3), inset 0 0 40px rgba(34,231,255,.06);}
    svg.rink{display:block; width:100%; height:auto; border-radius:8px; filter:drop-shadow(0 8px 18px rgba(0,0,0,.5));}
    #puck{transition:transform .4s cubic-bezier(.2,.8,.2,1), opacity .25s; filter:drop-shadow(0 0 6px rgba(0,0,0,.6));}
    #puckGlow{transition:fill .2s, opacity .2s;}

    .cap{font-family:'Press Start 2P',monospace; text-align:center; font-size:13px; margin:20px 6px 0;
      letter-spacing:1px; line-height:1.7; color:var(--cyan); text-shadow:0 0 10px rgba(34,231,255,.55);}
    .cap .z{color:#fff; text-shadow:0 0 10px var(--magenta);}
    .cap.dim{color:var(--muted); text-shadow:none;}

    .controls{margin-top:26px; display:grid; grid-template-columns:1fr 1fr; gap:16px;}
    button{font-family:'Press Start 2P',monospace; font-size:13px; color:#fff; border:none; cursor:pointer; padding:22px 16px;
      border-radius:10px; letter-spacing:1px; line-height:1.5; position:relative; text-shadow:0 2px 0 rgba(0,0,0,.45);
      transition:transform .07s, filter .15s; display:flex; flex-direction:column; align-items:center; gap:12px; text-align:center;}
    button:active{transform:translateY(3px);}
    button:disabled{filter:grayscale(.7) brightness(.55); cursor:not-allowed;}
    button:focus-visible{outline:3px solid var(--gold); outline-offset:3px;}
    .start{background:linear-gradient(180deg,#1bd14a,#0e8f33); box-shadow:0 6px 0 #0a6e26, 0 0 26px rgba(27,209,74,.5);}
    .start.on{background:linear-gradient(180deg,#ff3a5a,#c4112c); box-shadow:0 6px 0 #8c0a20, 0 0 30px rgba(255,45,74,.6);}
    .reset{background:linear-gradient(180deg,#2f6bff,#1c44c8); box-shadow:0 6px 0 #122e8c, 0 0 26px rgba(47,107,255,.5);}
    .lamp{width:16px;height:16px;border-radius:50%;background:#3a0d12;box-shadow:inset 0 0 5px #000;}
    .start.on .lamp{background:var(--goal); box-shadow:0 0 16px 5px var(--goal); animation:pulse 1s infinite;}
    @keyframes pulse{50%{opacity:.5;}}
    .hint{font-family:'Press Start 2P',monospace; font-size:8px; color:rgba(255,255,255,.78);}

    .status{font-family:'Press Start 2P',monospace; text-align:center; margin-top:18px; min-height:14px;
      font-size:9px; line-height:1.6; color:var(--muted); letter-spacing:1px;}
    .errbox{display:none; margin-top:12px; background:#1a0e12; border:1px solid #5b1f27; border-radius:10px; padding:0 14px;}
    .errbox[open]{padding-bottom:12px;}
    .errbox summary{cursor:pointer; padding:12px 0; color:#ff8a8a; font-size:12px; list-style:none;}
    .errbox summary::-webkit-details-marker{display:none;}
    .errbox pre{margin:0; white-space:pre-wrap; word-break:break-word; font-size:12px; color:#ffb3b3; font-family:ui-monospace,monospace;}

    /* bottom scene: one Islanders-style player + one helmet, on the ice glow */
    .bottom{margin-top:30px; padding-top:20px; display:flex; align-items:flex-end; justify-content:center; gap:40px;
      position:relative; border-top:1px solid rgba(47,107,255,.22);}
    .bottom::after{content:""; position:absolute; left:8%; right:8%; bottom:6px; height:14px; border-radius:50%;
      background:radial-gradient(ellipse at center, rgba(34,231,255,.35), rgba(34,231,255,0) 70%);}
    .bottom .player{height:172px; width:auto; position:relative; z-index:1; filter:drop-shadow(0 10px 10px rgba(0,0,0,.45));}
    .bottom .helmet-hero{height:118px; width:auto; border-radius:12px; position:relative; z-index:1;
      box-shadow:0 0 0 1px rgba(34,231,255,.5), 0 0 22px rgba(34,231,255,.4); filter:saturate(1.18);}

    @media (max-width:520px){
      .marquee h1{font-size:22px;}
      .controls{grid-template-columns:1fr;}
      .bottom{gap:24px;}
      .bottom .player{height:140px;} .bottom .helmet-hero{height:96px;}
    }
    @media (prefers-reduced-motion:reduce){
      #puck{transition:none;} .start.on .lamp{animation:none;} .blink{animation:none;}
    }
  </style>
</head>
<body>
  <div class="frame" aria-hidden="true"></div>

  <div class="wrap">
    <div class="marquee"><h1>ROD&nbsp;HOCKEY</h1></div>
    <div class="credits">
      <span>1 PLAYER</span>
      <span class="live" id="conn"><span class="led" id="led"></span><span id="connText">CONNECTING</span></span>
      <span class="blink">INSERT&nbsp;PUCK</span>
    </div>

    <!-- Rink: top-down ice. Puck is plotted at its true (u, v). -->
    <div class="screen">
      <svg class="rink" viewBox="0 0 600 300" role="img" aria-label="Rink with live puck position">
        <defs><linearGradient id="ice" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="var(--ice-a)"/><stop offset="1" stop-color="var(--ice-b)"/></linearGradient></defs>
        <rect x="10" y="10" width="580" height="280" rx="92" fill="url(#ice)" stroke="#9bb6cf" stroke-width="2"/>
        <line x1="78" y1="20" x2="78" y2="280" stroke="var(--line-red)" stroke-width="2"/>
        <line x1="522" y1="20" x2="522" y2="280" stroke="var(--line-red)" stroke-width="2"/>
        <rect x="222" y="10" width="6" height="280" fill="var(--line-blue)"/>
        <rect x="372" y="10" width="6" height="280" fill="var(--line-blue)"/>
        <rect x="297" y="10" width="6" height="280" fill="var(--line-red)"/>
        <circle cx="300" cy="150" r="46" fill="none" stroke="var(--line-blue)" stroke-width="2.5"/>
        <circle cx="300" cy="150" r="4" fill="var(--line-red)"/>
        <circle cx="140" cy="150" r="30" fill="none" stroke="var(--line-red)" stroke-width="2"/><circle cx="140" cy="150" r="4" fill="var(--line-red)"/>
        <circle cx="460" cy="150" r="30" fill="none" stroke="var(--line-red)" stroke-width="2"/><circle cx="460" cy="150" r="4" fill="var(--line-red)"/>
        <rect x="62" y="136" width="14" height="28" fill="none" stroke="var(--line-red)" stroke-width="2"/>
        <rect x="524" y="136" width="14" height="28" fill="none" stroke="var(--line-red)" stroke-width="2"/>
        <!-- the puck (moved by JS to the detected position) -->
        <g id="puck" opacity="0" transform="translate(300,150)">
          <circle id="puckGlow" r="30" fill="var(--cyan)" opacity="0"/>
          <ellipse cx="0" cy="3" rx="17" ry="11" fill="#000" opacity=".3"/>
          <ellipse cx="0" cy="0" rx="17" ry="11" fill="#0e0f12"/>
          <ellipse cx="0" cy="-3" rx="14" ry="7" fill="#2a2d33"/>
        </g>
      </svg>
    </div>

    <p class="cap dim" id="puckCap">SEARCHING FOR PUCK…</p>

    <div class="controls">
      <button id="auto" class="start" disabled>
        <span class="lamp"></span>
        <span id="autoLabel">AUTO-PLAY</span>
        <span class="hint" id="autoHint">TAP TO START</span>
      </button>
      <button id="home" class="reset" disabled>
        HOME ALL RODS
        <span class="hint">RESURFACE</span>
      </button>
    </div>

    <p class="status" id="status"></p>
    <details class="errbox" id="errBox">
      <summary id="errSummary">⚠ ERROR — TAP FOR DETAILS</summary>
      <pre id="errMsg"></pre>
    </details>

    <div class="bottom">
      <!-- original Islanders-colored skater (not the trademarked logo) -->
      <svg class="player" viewBox="0 0 140 184" role="img" aria-label="Hockey player">
        <line x1="44" y1="96" x2="120" y2="150" stroke="#caa06a" stroke-width="5" stroke-linecap="round"/>
        <path d="M116 145 L134 150 L132 161 L113 156 Z" fill="#111418"/>
        <path d="M64 122 L52 160" stroke="var(--isle-deep)" stroke-width="15" stroke-linecap="round"/>
        <path d="M84 122 L98 158" stroke="var(--isle-deep)" stroke-width="15" stroke-linecap="round"/>
        <path d="M56 148 L52 160" stroke="var(--isle-orange)" stroke-width="15" stroke-linecap="round"/>
        <path d="M92 146 L98 158" stroke="var(--isle-orange)" stroke-width="15" stroke-linecap="round"/>
        <path d="M42 160 L62 160 L60 168 L40 168 Z" fill="#eef3fa"/>
        <path d="M90 158 L110 160 L108 168 L88 168 Z" fill="#eef3fa"/>
        <line x1="40" y1="170" x2="62" y2="170" stroke="#9fb3cc" stroke-width="2"/>
        <line x1="88" y1="170" x2="110" y2="170" stroke="#9fb3cc" stroke-width="2"/>
        <path d="M49 80 Q72 71 93 81 L88 124 Q70 130 54 124 Z" fill="var(--isle-blue)"/>
        <rect x="51" y="101" width="40" height="9" fill="var(--isle-orange)"/>
        <text x="71" y="99" text-anchor="middle" font-family="'Press Start 2P',monospace" font-size="13" fill="#fff">21</text>
        <path d="M52 85 L36 98" stroke="var(--isle-blue)" stroke-width="13" stroke-linecap="round"/>
        <path d="M90 85 L112 100" stroke="var(--isle-blue)" stroke-width="13" stroke-linecap="round"/>
        <circle cx="35" cy="99" r="8" fill="var(--isle-orange)"/>
        <circle cx="114" cy="102" r="8" fill="var(--isle-orange)"/>
        <circle cx="71" cy="58" r="15" fill="#f0c8a4"/>
        <path d="M55 57 a16 16 0 0 1 32 0 Z" fill="var(--isle-blue)"/>
        <path d="M56 57 q15 -6 30 0" fill="none" stroke="var(--isle-orange)" stroke-width="3"/>
        <path d="M60 64 H82 M60 69 H82 M66 61 V72 M76 61 V72" stroke="#23344f" stroke-width="2"/>
      </svg>
      <img class="helmet-hero" src="./viam-helmet.png" alt="VIAM helmet on the ice" />
    </div>
  </div>

  <script type="module">
    import * as VIAM from 'https://esm.sh/@viamrobotics/sdk@0.40.0';
    import { getHostAndCredentials } from './auth.js';

    const SERVICE_NAME = 'rod-hockey-game';

    // ── Skip the Viam login (optional) ───────────────────────────────────────
    // Fill these in to let anyone open the page without logging in to Viam.
    // SECURITY: shipped in the page — use a tightly-scoped LOCATION api key.
    const EMBEDDED = { host: '', apiKeyId: '', apiKey: '' };

    const led = document.getElementById('led');
    const conn = document.getElementById('conn');
    const connText = document.getElementById('connText');
    const puck = document.getElementById('puck');
    const puckGlow = document.getElementById('puckGlow');
    const puckCap = document.getElementById('puckCap');
    const autoBtn = document.getElementById('auto');
    const autoLabel = document.getElementById('autoLabel');
    const autoHint = document.getElementById('autoHint');
    const homeBtn = document.getElementById('home');
    const statusEl = document.getElementById('status');
    const errBox = document.getElementById('errBox');
    const errSummary = document.getElementById('errSummary');
    const errMsg = document.getElementById('errMsg');

    let service = null;
    let autoOn = false;

    function showError(label, e) {
      errSummary.textContent = `⚠ ${label.toUpperCase()} — TAP FOR DETAILS`;
      errMsg.textContent = e?.message || String(e);
      errBox.style.display = 'block';
      console.error(label, e);
    }
    function clearError() { errBox.style.display = 'none'; }

    function setConn(state) {
      // state: 'connecting' | 'live' | 'bad'
      led.className = state === 'live' ? 'led live' : state === 'bad' ? 'led bad' : 'led';
      conn.className = state === 'live' ? 'live on' : 'live';
      connText.textContent = state === 'live' ? 'ON THE ICE' : state === 'bad' ? 'OFFLINE' : 'CONNECTING';
    }

    // "LEFT_WING" -> "LEFT WING"
    function pretty(zone) {
      return zone.replace(/_/g, ' ').toUpperCase();
    }

    async function connect() {
      const { host, credentials } = EMBEDDED.host && EMBEDDED.apiKey
        ? { host: EMBEDDED.host,
            credentials: { type: 'api-key', payload: EMBEDDED.apiKey, authEntity: EMBEDDED.apiKeyId } }
        : getHostAndCredentials();
      const client = await VIAM.createRobotClient({
        host, credentials, signalingAddress: 'https://app.viam.com:443',
      });
      service = new VIAM.GenericServiceClient(client, SERVICE_NAME);
      setConn('live');
      autoBtn.disabled = false;
      homeBtn.disabled = false;
    }

    function renderAuto() {
      autoBtn.className = autoOn ? 'start on' : 'start';
      autoHint.textContent = autoOn ? 'ON — TAP TO STOP' : 'TAP TO START';
    }

    // Plot the puck at its true (u, v) on the rink and describe the zone.
    // Mapping: v -> long axis (x), u -> short axis (y), within the ice rect.
    function renderPuck(s) {
      if (!s.puck_detected) {
        puck.setAttribute('opacity', '0');
        puckCap.className = 'cap dim';
        puckCap.textContent = 'SEARCHING FOR PUCK…';
        return;
      }
      const x = 10 + s.puck_v * 580;
      const y = 10 + s.puck_u * 280;
      puck.setAttribute('transform', `translate(${x},${y})`);
      puck.setAttribute('opacity', '1');
      if (s.zone && s.has_play) {
        puckGlow.setAttribute('fill', 'var(--magenta)');
        puckGlow.setAttribute('opacity', '0.22');
        puckCap.className = 'cap';
        puckCap.innerHTML = `&#9654; <span class="z">${pretty(s.zone)}</span> &mdash; READY TO FIRE`;
      } else if (s.zone) {
        puckGlow.setAttribute('fill', 'var(--cyan)');
        puckGlow.setAttribute('opacity', '0.12');
        puckCap.className = 'cap dim';
        puckCap.innerHTML = `<span class="z">${pretty(s.zone)}</span> &mdash; NO PLAY HERE`;
      } else {
        puckGlow.setAttribute('opacity', '0');
        puckCap.className = 'cap dim';
        puckCap.textContent = 'PUCK SPOTTED — NOT IN A PLAY ZONE';
      }
    }

    async function refreshStatus() {
      if (!service) return;
      try {
        const s = await service.doCommand(VIAM.Struct.fromJson({ action: 'status' }));
        autoOn = !!s.auto_play;
        renderAuto();
        renderPuck(s);
        setConn('live');
        clearError();
      } catch (e) {
        setConn('bad');
        showError('Status failed', e);
      }
    }

    autoBtn.onclick = async () => {
      autoBtn.disabled = true;
      try {
        await service.doCommand(VIAM.Struct.fromJson({ action: 'auto_play', enabled: !autoOn }));
        await refreshStatus();
      } catch (e) {
        showError('Auto-play failed', e);
      } finally {
        autoBtn.disabled = false;
      }
    };

    homeBtn.onclick = async () => {
      homeBtn.disabled = true;
      statusEl.textContent = 'RESURFACING — HOMING ALL RODS…';
      try {
        const r = await service.doCommand(VIAM.Struct.fromJson({ action: 'home' }));
        statusEl.textContent = (r.message || 'RODS HOMED.').toUpperCase();
      } catch (e) {
        statusEl.textContent = '';
        showError('Home failed', e);
      } finally {
        homeBtn.disabled = false;
      }
    };

    try {
      await connect();
      await refreshStatus();
      setInterval(refreshStatus, 1000);
    } catch (e) {
      setConn('bad');
      showError('Connect failed', e);
    }
  </script>
</body>
</html>
